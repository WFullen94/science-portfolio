name: Graph ML CI

on:
  push:
    paths: ['project-graphml/**', '.github/workflows/graphml-ci.yml']
  pull_request:
    paths: ['project-graphml/**', '.github/workflows/graphml-ci.yml']
  workflow_dispatch:

defaults:
  run:
    working-directory: project-graphml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: project-graphml/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install -e .

      # Fixture-based tests: graph construction, model shapes, typed negative
      # sampling, prediction helpers. No network / trained model needed.
      - name: Run tests
        run: pytest -q
