name: P3 RAG CI

on:
  push:
    paths: ['project-3-rag/**', '.github/workflows/p3-ci.yml']
  pull_request:
    paths: ['project-3-rag/**', '.github/workflows/p3-ci.yml']
  workflow_dispatch:  # allow manual runs

defaults:
  run:
    working-directory: project-3-rag

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: project-3-rag/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install -e .

      # Model-free tests only: ATT&CK STIX parsing, chain wiring, eval-set
      # integrity. Tests needing the Ollama server / FAISS index skip cleanly.
      - name: Run tests
        run: pytest -q
