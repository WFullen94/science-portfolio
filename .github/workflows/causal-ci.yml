name: Causal CI

on:
  push:
    paths: ['project-causal/**', '.github/workflows/causal-ci.yml']
  pull_request:
    paths: ['project-causal/**', '.github/workflows/causal-ci.yml']
  workflow_dispatch:

defaults:
  run:
    working-directory: project-causal

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: project-causal/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install -e .

      # Simulation + estimator tests: naive is biased, causal estimators recover
      # the known ATE, and the T-learner recovers the heterogeneous effect.
      - name: Run tests
        run: pytest -q
