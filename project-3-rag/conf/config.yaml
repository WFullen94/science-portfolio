# Project 3 — RAG over MITRE ATT&CK. Single source of truth for the pipeline.

project_name: rag-attack

# --- Corpus: MITRE ATT&CK Enterprise (STIX 2.1 JSON) -------------------------
corpus:
  name: MITRE ATT&CK Enterprise
  # Official STIX bundle from the MITRE ATT&CK data repo.
  stix_url: https://raw.githubusercontent.com/mitre-attack/attack-stix-data/master/enterprise-attack/enterprise-attack.json
  cache: data/enterprise-attack.json

paths:
  documents: data/documents.jsonl      # one JSON doc per ATT&CK technique
  faiss_index: data/faiss_index        # persisted FAISS vector store
  eval_set: data/eval_set.jsonl        # question/ground-truth pairs for Ragas
  reports: data/reports                # Ragas + eval outputs

# --- Embeddings (bi-encoder) -------------------------------------------------
embeddings:
  model: sentence-transformers/all-MiniLM-L6-v2
  device: cpu                          # 'mps' to use Apple GPU; cpu is portable
  normalize: true

# --- Chunking ----------------------------------------------------------------
chunking:
  chunk_size: 900
  chunk_overlap: 120

# --- Retrieval (two-stage: bi-encoder recall -> cross-encoder rerank) --------
retrieval:
  top_k: 12                            # candidates from the vector store
  rerank_top_n: 4                      # kept after cross-encoder reranking
  reranker: cross-encoder/ms-marco-MiniLM-L-6-v2

# --- Generation (LLM) --------------------------------------------------------
# Pluggable: 'ollama' (local, free — the default), or 'anthropic' / 'openai'
# (set the matching API key in the environment).
generation:
  backend: ollama
  model: llama3.1:8b
  temperature: 0.0
  max_tokens: 512
